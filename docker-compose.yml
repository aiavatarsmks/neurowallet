version: '3.8'

services:
  # PostgreSQL database used by Prisma. Adjust ports or credentials as needed.
  postgres:
    image: postgres:15-alpine
    container_name: neurowallet_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neurodb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # pgAdmin for inspecting the database in a browser.
  pgadmin:
    image: dpage/pgadmin4
    container_name: neurowallet_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: