name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Audit frontend
        working-directory: frontend
        run: |
          npm install
          npm audit --audit-level=high

      - name: Audit backend
        working-directory: backend
        run: |
          npm install
          npm audit --audit-level=high

  frontend:
    name: Frontend build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        working-directory: frontend
        run: npm install

      - name: Lint (react-hooks/rules-of-hooks blocks merge)
        working-directory: frontend
        run: npm run lint

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Test
        working-directory: frontend
        run: npm test

  backend:
    name: Backend test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        working-directory: backend
        run: npm install

      - name: Test
        working-directory: backend
        run: npm test
